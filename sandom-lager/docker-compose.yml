services:
  # -----------------------------
  # PostgreSQL Database
  # -----------------------------
  db:
    image: postgres:16
    container_name: sandom-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sandomlager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql


  # -----------------------------
  # pgAdmin GUI
  # -----------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: sandom-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sandom.no
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
    - pgadmin_data:/var/lib/pgadmin

  # -----------------------------
  # Backend API (Express)
  # -----------------------------
  backend:
    build: ./backend
    container_name: sandom-backend
    restart: always
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      DATABASE_URL: postgres://admin:admin@db:5432/sandomlager
      AUTH0_DOMAIN: sandomstiftelsen.eu.auth0.com
      AUTH0_AUDIENCE: https://sandom-api
    depends_on:
      - db

  # -----------------------------
  # Frontend (React + Vite)
  # -----------------------------
  frontend:
    build: ./frontend
    container_name: sandom-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      API_TARGET: http://backend:5000
    depends_on:
      - backend

# -----------------------------
# Persistent Volume
# -----------------------------
volumes:
  pgdata:
  pgadmin_data:
