services:
  # -----------------------------
  # PostgreSQL Database
  # -----------------------------
  db:
    image: postgres:16
    container_name: sandom-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sandomlager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # -----------------------------
  # pgAdmin GUI
  # -----------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: sandom-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sandom.no
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  # -----------------------------
  # Backend API (Express)
  # -----------------------------
  backend:
    build: ./backend
    container_name: sandom-backend
    restart: always
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: postgres://admin:admin@db:5432/sandomlager
    depends_on:
      - db

  # -----------------------------
  # Frontend (React + Vite)
  # -----------------------------
  frontend:
    build: ./frontend
    container_name: sandom-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

# -----------------------------
# Persistent Volume
# -----------------------------
volumes:
  pgdata:
