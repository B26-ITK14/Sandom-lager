services:
  # -----------------------------
  # PostgreSQL Database
  # -----------------------------
  db:
    image: postgres:16
    container_name: sandom-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sandomlager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/db/seed.dev.sql:/docker-entrypoint-initdb.d/02-seed.dev.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sandomlager"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # -----------------------------
  # pgAdmin GUI
  # -----------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: sandom-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sandom.no
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # -----------------------------
  # Backend API (Express)
  # -----------------------------
  backend:
    build: ./backend
    container_name: sandom-backend
    restart: always
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://admin:admin@db:5432/sandomlager
      AUTH0_DOMAIN: sandomstiftelsen.eu.auth0.com
      AUTH0_AUDIENCE: https://sandom-api
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,http://frontend:5173,http://frontend:5174
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
        - action: sync+restart
          path: ./backend/package.json
          target: /app/package.json
        - action: sync+restart
          path: ./backend/package-lock.json
          target: /app/package-lock.json

  # -----------------------------
  # Frontend (React + Vite)
  # -----------------------------
  frontend:
    build: ./frontend
    container_name: sandom-frontend
    restart: always
    ports:
      - "5173:5173"
      - "5174:5174"
    env_file:
      - ./frontend/.env
    environment:
      API_TARGET: http://backend:5000
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: 5173
      VITE_APP_LAST_UPDATED: 2026-05-19
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: sync+restart
          path: ./frontend/package.json
          target: /app/package.json
        - action: sync+restart
          path: ./frontend/package-lock.json
          target: /app/package-lock.json
        - action: sync+restart
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
        - action: sync+restart
          path: ./frontend/tsconfig.json
          target: /app/tsconfig.json
        - action: sync+restart
          path: ./frontend/tsconfig.app.json
          target: /app/tsconfig.app.json
        - action: sync+restart
          path: ./frontend/tsconfig.node.json
          target: /app/tsconfig.node.json
        - action: sync+restart
          path: ./frontend/tailwind.config.ts
          target: /app/tailwind.config.ts
        - action: sync+restart
          path: ./frontend/postcss.config.ts
          target: /app/postcss.config.ts
        - action: sync+restart
          path: ./frontend/eslint.config.mts
          target: /app/eslint.config.mts

# -----------------------------
# Persistent Volume
# -----------------------------
volumes:
  pgdata:
  pgadmin_data:
