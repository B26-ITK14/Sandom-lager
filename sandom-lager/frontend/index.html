    <!-- Font Size Script (runs before rendering) -->
    <script>
      (function () {
        try {
          var fs = JSON.parse(localStorage.getItem('app:fontSize'));
          var sizes = { small: '87.5%', medium: '100%', large: '112.5%' };
          if (sizes[fs]) document.documentElement.style.fontSize = sizes[fs];
        } catch (e) {}
      })();
    </script>
